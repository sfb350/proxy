<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quasar Browser</title>

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    /* Top bar */
    .topbar {
        display: flex;
        align-items: center;
        padding: 10px;
        background: #1e293b;
        gap: 8px;
    }

    .btn {
        background: #334155;
        border: none;
        color: white;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
    }

    .btn:hover {
        background: #475569;
    }

    .url-bar {
        flex: 1;
        display: flex;
        background: #0f172a;
        border-radius: 10px;
        padding: 5px 10px;
    }

    .url-bar input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        color: white;
        font-size: 14px;
    }

    /* Browser view */
    webview {
        flex: 1;
        width: 100%;
    }
</style>
</head>

<body>

<div class="topbar">
    <button class="btn" id="backBtn">⬅</button>
    <button class="btn" id="forwardBtn">➡</button>
    <button class="btn" id="reloadBtn">⟳</button>

    <form class="url-bar" id="urlForm">
        <input id="urlInput" type="text" placeholder="Search or enter URL">
    </form>

    <button class="btn" id="homeBtn">🏠</button>
    <button class="btn" id="fullscreenBtn">⛶</button>
</div>

<webview id="frame" src="https://dmectexas.org/" allowpopups></webview>

<script>
const frame = document.getElementById("frame");
const urlInput = document.getElementById("urlInput");
const urlForm = document.getElementById("urlForm");

const HOME = "https://dmectexas.org/";

// Set default
urlInput.value = HOME;

// Convert input → URL or search
function processInput(input) {
    input = input.trim();

    if (input.startsWith("http://") || input.startsWith("https://")) {
        return input;
    }

    if (input.includes(".")) {
        return "https://" + input;
    }

    return "https://www.google.com/search?q=" + encodeURIComponent(input);
}

// Navigate
function navigate(url) {
    frame.src = url;
    urlInput.value = url;
}

// Submit URL/search
urlForm.addEventListener("submit", (e) => {
    e.preventDefault();
    navigate(processInput(urlInput.value));
});

// Controls
document.getElementById("backBtn").onclick = () => frame.goBack();
document.getElementById("forwardBtn").onclick = () => frame.goForward();
document.getElementById("reloadBtn").onclick = () => frame.reload();
document.getElementById("homeBtn").onclick = () => navigate(HOME);

// Fullscreen
document.getElementById("fullscreenBtn").onclick = () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
};

// Sync URL bar
frame.addEventListener("did-navigate", (e) => {
    urlInput.value = e.url;
});

frame.addEventListener("did-navigate-in-page", (e) => {
    urlInput.value = e.url;
});
</script>

</body>
</html>
