<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Abe Browser</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

#topbar{
display:flex;
align-items:center;
padding:10px;
background:#1e293b;
}

#url{
flex:1;
padding:10px;
border-radius:6px;
border:none;
font-size:16px;
}

button{
margin-left:8px;
padding:10px 14px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

#tabs{
display:flex;
background:#111827;
padding:5px;
overflow-x:auto;
}

.tab{
background:#374151;
padding:6px 10px;
margin-right:6px;
border-radius:6px;
cursor:pointer;
}

.tab.active{
background:#3b82f6;
}

iframe{
width:100%;
height:calc(100vh - 100px);
border:none;
background:white;
}

#suggestions{
position:absolute;
background:#1e293b;
width:300px;
border-radius:6px;
margin-top:4px;
}

.suggestion{
padding:6px;
cursor:pointer;
}

.suggestion:hover{
background:#334155;
}

</style>
</head>

<body>

<div id="tabs"></div>

<div id="topbar">

<input id="url" placeholder="Search or enter website" oninput="predict()">

<button onclick="go()">Go</button>
<button onclick="newTab()">New Tab</button>

</div>

<div id="suggestions"></div>

<iframe id="frame"></iframe>

<script>

let tabs=[]
let activeTab=0

function newTab(){

tabs.push("https://www.wikipedia.org")
activeTab=tabs.length-1
renderTabs()
loadTab()

}

function renderTabs(){

let container=document.getElementById("tabs")
container.innerHTML=""

tabs.forEach((t,i)=>{

let tab=document.createElement("div")
tab.className="tab"+(i===activeTab?" active":"")

tab.innerText="Tab "+(i+1)

tab.onclick=()=>{
activeTab=i
loadTab()
renderTabs()
}

container.appendChild(tab)

})

}

function go(){

let input=document.getElementById("url").value

if(!input.startsWith("http")){

if(input.includes(".")){
input="https://"+input
}else{
input="https://www.google.com/search?q="+encodeURIComponent(input)
}

}

tabs[activeTab]=input
loadTab()

saveHistory(input)

}

function loadTab(){

document.getElementById("frame").src=tabs[activeTab]

}

function saveHistory(site){

let history=JSON.parse(localStorage.getItem("history")||"[]")
history.unshift(site)
history=history.slice(0,20)
localStorage.setItem("history",JSON.stringify(history))

}

function predict(){

let input=document.getElementById("url").value.toLowerCase()
let history=JSON.parse(localStorage.getItem("history")||"[]")

let suggestions=history.filter(h=>h.toLowerCase().includes(input)).slice(0,5)

let box=document.getElementById("suggestions")
box.innerHTML=""

suggestions.forEach(s=>{

let div=document.createElement("div")
div.className="suggestion"
div.innerText=s

div.onclick=()=>{
document.getElementById("url").value=s
go()
box.innerHTML=""
}

box.appendChild(div)

})

}

newTab()

</script>

</body>
</html>
