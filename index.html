<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Abe Browser</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

#topbar{
display:flex;
padding:10px;
background:#1e293b;
gap:8px;
}

#url{
flex:1;
padding:10px;
border:none;
border-radius:6px;
font-size:16px;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

#tabs{
display:flex;
background:#111827;
padding:6px;
gap:6px;
overflow-x:auto;
}

.tab{
padding:6px 10px;
background:#374151;
border-radius:6px;
cursor:pointer;
}

.tab.active{
background:#3b82f6;
}

#gamesPanel{
display:none;
padding:20px;
}

.game{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:10px;
display:inline-block;
cursor:pointer;
}

iframe{
width:100%;
height:calc(100vh - 110px);
border:none;
background:white;
}

</style>
</head>

<body>

<div id="tabs"></div>

<div id="topbar">

<input id="url" placeholder="Search or enter website">

<button onclick="go()">Go</button>

<button onclick="newTab()">New Tab</button>

<button onclick="toggleGames()">Games</button>

</div>

<div id="gamesPanel">

<div class="game" onclick="openGame('snake')">Snake</div>
<div class="game" onclick="openGame('tetris')">Tetris</div>
<div class="game" onclick="openGame('pong')">Pong</div>
<div class="game" onclick="openGame('clicker')">Clicker</div>

<div id="gameArea"></div>

</div>

<iframe id="frame"></iframe>

<script>

let tabs=[]
let active=0

function newTab(){

tabs.push("https://dmectexas.org/")
active=tabs.length-1

renderTabs()
load()

}

function renderTabs(){

let bar=document.getElementById("tabs")
bar.innerHTML=""

tabs.forEach((t,i)=>{

let tab=document.createElement("div")

tab.className="tab"+(i===active?" active":"")

tab.innerText="Tab "+(i+1)

tab.onclick=()=>{

active=i
renderTabs()
load()

}

bar.appendChild(tab)

})

}

function go(){

let input=document.getElementById("url").value

if(!input.startsWith("http")){

if(input.includes(".")){
input="https://"+input
}else{
input="https://dmectexas.org/"+encodeURIComponent(input)
}

}

tabs[active]=input

load()

}

function load(){

document.getElementById("frame").style.display="block"
document.getElementById("gamesPanel").style.display="none"

document.getElementById("frame").src=tabs[active]

}

function toggleGames(){

document.getElementById("frame").style.display="none"
document.getElementById("gamesPanel").style.display="block"

}

function openGame(game){

let area=document.getElementById("gameArea")

if(game==="clicker"){

area.innerHTML=`<h2>Clicker Game</h2>
<button onclick="score++ ; document.getElementById('score').innerText=score">Click</button>
<div id="score">0</div>`

}

if(game==="snake"){

area.innerHTML=`<iframe src="https://playsnake.org"></iframe>`

}

if(game==="tetris"){

area.innerHTML=`<iframe src="https://tetris.com/play-tetris"></iframe>`

}

if(game==="pong"){

area.innerHTML=`<iframe src="https://ponggame.org"></iframe>`

}

}

let score=0

newTab()

</script>

</body>
</html>
