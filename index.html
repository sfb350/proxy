<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AbeOS</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
background:linear-gradient(120deg,#0f172a,#1e293b);
}

#desktop{
width:100vw;
height:100vh;
position:relative;
color:white;
}

.icon{
width:90px;
text-align:center;
cursor:pointer;
margin:20px;
display:inline-block;
}

.icon img{
width:60px;
}

.window{
position:absolute;
width:650px;
height:420px;
background:white;
border-radius:8px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
display:none;
flex-direction:column;
overflow:hidden;
}

.titlebar{
background:#2563eb;
color:white;
padding:8px;
cursor:move;
display:flex;
justify-content:space-between;
align-items:center;
}

.window iframe{
flex:1;
border:none;
}

textarea{
flex:1;
border:none;
resize:none;
padding:10px;
}

#taskbar{
position:fixed;
bottom:0;
width:100%;
height:40px;
background:#111;
display:flex;
align-items:center;
color:white;
padding:0 10px;
}

#clock{
margin-left:auto;
}

input{
padding:6px;
margin:5px;
}

button{
padding:6px 10px;
margin:5px;
}

</style>
</head>

<body>

<div id="desktop">

<div class="icon" onclick="openApp('browser')">
<img src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png">
<div>Browser</div>
</div>

<div class="icon" onclick="openApp('notes')">
<img src="https://cdn-icons-png.flaticon.com/512/3022/3022256.png">
<div>Notes</div>
</div>

<div class="icon" onclick="openApp('calc')">
<img src="https://cdn-icons-png.flaticon.com/512/992/992651.png">
<div>Calculator</div>
</div>

<div class="icon" onclick="openApp('terminal')">
<img src="https://cdn-icons-png.flaticon.com/512/906/906324.png">
<div>Terminal</div>
</div>


<div id="browser" class="window">

<div class="titlebar">
Browser
<button onclick="closeApp('browser')">X</button>
</div>

<input id="url" placeholder="Search or enter website">
<button onclick="go()">Go</button>

<iframe id="frame"></iframe>

</div>


<div id="notes" class="window">

<div class="titlebar">
Notes
<button onclick="closeApp('notes')">X</button>
</div>

<textarea id="noteArea"></textarea>

</div>


<div id="calc" class="window">

<div class="titlebar">
Calculator
<button onclick="closeApp('calc')">X</button>
</div>

<div style="padding:10px">

<input id="calcInput">

<button onclick="calculate()">=</button>

<div id="calcResult"></div>

</div>

</div>


<div id="terminal" class="window">

<div class="titlebar">
Terminal
<button onclick="closeApp('terminal')">X</button>
</div>

<div style="padding:10px;font-family:monospace">

<div>> type "help"</div>

<input id="termInput" onkeydown="terminal(event)">

<div id="termOutput"></div>

</div>

</div>

</div>

<div id="taskbar">

AbeOS

<div id="clock"></div>

</div>

<script>

function openApp(id){

let w=document.getElementById(id)

w.style.display="flex"
w.style.left="200px"
w.style.top="120px"

}

function closeApp(id){

document.getElementById(id).style.display="none"

}

function go(){

let input=document.getElementById("url").value

if(!input.startsWith("http")){
input="https://www.google.com/search?q="+encodeURIComponent(input)
}

document.getElementById("frame").src=input

}

function calculate(){

let val=document.getElementById("calcInput").value

document.getElementById("calcResult").innerText=eval(val)

}

function terminal(e){

if(e.key==="Enter"){

let cmd=document.getElementById("termInput").value
let out=document.getElementById("termOutput")

if(cmd==="help"){
out.innerHTML+="<div>commands: help, time, about</div>"
}

else if(cmd==="time"){
out.innerHTML+="<div>"+new Date()+"</div>"
}

else if(cmd==="about"){
out.innerHTML+="<div>AbeOS Web Desktop</div>"
}

else{
out.innerHTML+="<div>command not found</div>"
}

document.getElementById("termInput").value=""

}

}

function updateClock(){

let d=new Date()

document.getElementById("clock").innerText=d.toLocaleTimeString()

}

setInterval(updateClock,1000)


let windows=document.querySelectorAll(".window")

windows.forEach(win=>{

let bar=win.querySelector(".titlebar")

bar.onmousedown=function(e){

let shiftX=e.clientX-win.getBoundingClientRect().left
let shiftY=e.clientY-win.getBoundingClientRect().top

function moveAt(x,y){

win.style.left=x-shiftX+"px"
win.style.top=y-shiftY+"px"

}

function onMouseMove(e){

moveAt(e.pageX,e.pageY)

}

document.addEventListener("mousemove",onMouseMove)

document.onmouseup=function(){

document.removeEventListener("mousemove",onMouseMove)

document.onmouseup=null

}

}

})

</script>

</body>
</html>
